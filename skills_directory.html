<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill Swap</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

    body{
      background:linear-gradient(135deg,#e9f2ff 0%, #f7e9ff 50%, #e9fff3 100%);
      color:#1f1f1f;
      overflow-x:hidden;
    }

    header{
      position:sticky;
      top:0;
      z-index:1000;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:14px 28px;
      background:rgba(255,255,255,0.75);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(0,0,0,0.06);
    }

    .logo{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;}

    nav a{
      margin:0 10px;
      text-decoration:none;
      color:#333;
      font-weight:500;
      cursor:pointer;
    }

    .btn{
      padding:10px 16px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      background:linear-gradient(135deg,#4a6cf7,#7b5cff);
      color:white;
      font-weight:500;
    }

    section{padding:70px 20px;max-width:1100px;margin:auto;}
    h2{text-align:center;margin-bottom:30px;}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;}

    .card{
      background:rgba(255,255,255,0.85);
      padding:20px;
      border-radius:16px;
      box-shadow:0 10px 25px rgba(0,0,0,0.06);
      cursor:pointer;
    }

    input{
      padding:12px;
      width:100%;
      border-radius:10px;
      border:1px solid rgba(0,0,0,0.1);
      margin-bottom:10px;
    }

    .alpha{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      justify-content:center;
      margin:10px 0;
    }

    .alpha span{
      padding:6px 10px;
      background:#fff;
      border-radius:8px;
      cursor:pointer;
      font-size:12px;
      box-shadow:0 3px 10px rgba(0,0,0,0.05);
    }

    .skill-card small{display:block;margin-top:5px;color:#555;}

    /* modal */
    .modal{
      display:none;
      position:fixed;
      top:0;left:0;
      width:100%;height:100%;
      background:rgba(0,0,0,0.5);
      justify-content:center;
      align-items:center;
    }

    .modal-content{
      background:#fff;
      padding:20px;
      border-radius:12px;
      width:320px;
    }

    .tag{
      display:inline-block;
      padding:4px 8px;
      background:#eef2ff;
      border-radius:20px;
      font-size:11px;
      margin-top:6px;
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Skill Swap</div>
  <nav>
    <a onclick="scrollTo('skills')">Skills</a>
  </nav>
  <button class="btn">Join</button>
</header>

<section>
  <h2>Skill Directory</h2>

  <input id="search" placeholder="Search skills..." onkeyup="render()">

  <div class="alpha" id="alpha">
    <span onclick="filterAlpha('ALL')">ALL</span>
  </div>

  <div id="list" class="grid"></div>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <h3 id="mSkill"></h3>
    <div id="mUsers"></div>
    <button class="btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const skillsData=[
  {name:"Accounting",offer:3,req:2,users:["Ali","Sara"]},
  {name:"Blogging",offer:2,req:5,users:["Hassan"]},
  {name:"Coding",offer:10,req:8,users:["Ali","Usman"]},
  {name:"Design",offer:6,req:4,users:["Ayesha"]},
  {name:"English Speaking",offer:7,req:3,users:["Fatima"]},
  {name:"Marketing",offer:4,req:6,users:["Zainab"]},
  {name:"Video Editing",offer:5,req:9,users:["Bilal"]}
];

let current="ALL";

function renderAlpha(){
  const alpha=document.getElementById("alpha");
  const letters="ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
  letters.forEach(l=>{
    const s=document.createElement("span");
    s.innerText=l;
    s.onclick=()=>filterAlpha(l);
    alpha.appendChild(s);
  });
}

function filterAlpha(l){
  current=l;
  render();
}

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const box=document.getElementById("list");
  box.innerHTML="";

  let filtered=skillsData.filter(s=>s.name.toLowerCase().includes(q));

  if(current!=="ALL"){
    filtered=filtered.filter(s=>s.name.startsWith(current));
  }

  filtered.sort((a,b)=>a.name.localeCompare(b.name));

  filtered.forEach(s=>{
    const div=document.createElement("div");
    div.className="card skill-card";
    div.innerHTML=`
      <b>${s.name}</b>
      <small>Offer: ${s.offer} | Request: ${s.req}</small>
      <span class="tag">Click to view users</span>
    `;

    div.onclick=()=>openSkill(s);

    box.appendChild(div);
  });
}

function openSkill(skill){
  document.getElementById("modal").style.display="flex";
  document.getElementById("mSkill").innerText=skill.name;

  const u=document.getElementById("mUsers");
  u.innerHTML="";

  skill.users.forEach(x=>{
    const d=document.createElement("div");
    d.innerHTML=`👤 ${x} <button class='btn' style='margin-left:10px'>Connect</button>`;
    u.appendChild(d);
  });
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function scrollTo(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}

renderAlpha();
render();
</script>

</body>
</html>
