<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Skill Swap</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <style>
    @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(30px,-20px) scale(1.1)} }
    @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-25px,15px) scale(1.05)} }
    @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(20px,25px)} }
    @keyframes slideUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .blob1 { animation: float1 8s ease-in-out infinite; }
    .blob2 { animation: float2 10s ease-in-out infinite; }
    .blob3 { animation: float3 12s ease-in-out infinite; }
    .slide-up { animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards; }
    .fade-in { animation: fadeIn 0.5s ease forwards; }
    .input-glow:focus { box-shadow: 0 0 0 3px rgba(139,92,246,0.25); }
    .card-glass { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full" style="font-family:'Outfit',sans-serif; margin:0;">
  <div id="app-wrapper" class="h-full w-full overflow-auto relative flex items-center justify-center" style="background:#0f0f1a;">
   <!-- Back to home button --> <a href="index.html" class="absolute top-6 left-6 z-20 w-10 h-10 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:-translate-y-1" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);" title="Back to Home"> <i data-lucide="arrow-left" style="width:18px;height:18px;color:rgba(255,255,255,0.7);"></i> </a><!-- Animated blobs -->
   <div class="blob1 absolute w-72 h-72 rounded-full opacity-40" style="background:radial-gradient(circle,#8b5cf6,transparent 70%);top:-5%;left:-5%;"></div>
   <div class="blob2 absolute w-96 h-96 rounded-full opacity-30" style="background:radial-gradient(circle,#ec4899,transparent 70%);bottom:-10%;right:-8%;"></div>
   <div class="blob3 absolute w-64 h-64 rounded-full opacity-25" style="background:radial-gradient(circle,#06b6d4,transparent 70%);top:40%;right:20%;"></div><!-- Subtle grid overlay -->
   <div class="absolute inset-0 opacity-5" style="background-image:linear-gradient(rgba(255,255,255,.1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.1) 1px,transparent 1px);background-size:60px 60px;"></div>
   <div class="relative z-10 w-full max-w-md mx-4 slide-up" style="animation-delay:0.1s;">
    <!-- Card -->
    <div class="card-glass rounded-3xl p-8 md:p-10" id="signup-card" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);">
     <!-- Logo -->
     <div class="flex items-center justify-center gap-2 mb-2">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center" id="logo-box" style="background:linear-gradient(135deg,#8b5cf6,#ec4899);">
       <i data-lucide="repeat" style="width:20px;height:20px;color:#fff;"></i>
      </div><span class="text-lg font-semibold" style="color:rgba(255,255,255,0.7);">Skill Swap</span>
     </div>
     <h2 id="page-title" class="text-center text-2xl md:text-3xl font-bold mb-1" style="color:#ffffff;">Create an Account</h2>
     <p class="text-center text-sm mb-8" style="color:rgba(255,255,255,0.4);">Start swapping skills with people worldwide</p>
     <form id="signup-form" class="flex flex-col gap-4">
      <div>
       <label for="name" class="block text-sm font-medium mb-1.5" style="color:rgba(255,255,255,0.6);">Name</label>
       <div class="relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,0.3);"><i data-lucide="user" style="width:18px;height:18px;"></i></span> <input type="text" id="name" name="name" placeholder="Your full name" required class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm input-glow outline-none transition-all" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;">
       </div>
      </div>
      <div>
       <label for="email" class="block text-sm font-medium mb-1.5" style="color:rgba(255,255,255,0.6);">Email</label>
       <div class="relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,0.3);"><i data-lucide="mail" style="width:18px;height:18px;"></i></span> <input type="email" id="email" name="email" placeholder="you@example.com" required class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm input-glow outline-none transition-all" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;">
       </div>
      </div>
      <div>
       <label for="password" class="block text-sm font-medium mb-1.5" style="color:rgba(255,255,255,0.6);">Password</label>
       <div class="relative">
        <span class="absolute left-4 top-1/2 -translate-y-1/2" style="color:rgba(255,255,255,0.3);"><i data-lucide="lock" style="width:18px;height:18px;"></i></span> <input type="password" id="password" name="password" placeholder="Create a password" required class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm input-glow outline-none transition-all" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#fff;"> <button type="button" id="toggle-pw" class="absolute right-4 top-1/2 -translate-y-1/2 cursor-pointer" style="color:rgba(255,255,255,0.3);background:none;border:none;"> <i data-lucide="eye" style="width:18px;height:18px;"></i> </button>
       </div>
      </div><button type="submit" id="submit-btn" class="w-full py-3.5 rounded-xl text-sm font-semibold mt-2 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98]" style="background:linear-gradient(135deg,#8b5cf6,#ec4899);color:#fff;border:none;cursor:pointer;"> Sign Up </button>
     </form><!-- Success message (hidden) -->
     <div id="success-msg" class="hidden mt-4 p-4 rounded-xl text-center text-sm" style="background:rgba(34,197,94,0.15);color:#4ade80;">
      <i data-lucide="check-circle" style="width:20px;height:20px;display:inline;vertical-align:middle;margin-right:6px;"></i> Account created successfully!
     </div>
     <p id="footer-text" class="text-center text-sm mt-6" style="color:rgba(255,255,255,0.4);">Already have an account? <a href="#" class="font-medium hover:underline" style="color:#a78bfa;">Login here</a></p><!-- Divider -->
     <div class="flex items-center gap-3 mt-6 mb-5">
      <div class="flex-1 h-px" style="background:rgba(255,255,255,0.08);"></div><span class="text-xs" style="color:rgba(255,255,255,0.25);">Connect with us</span>
      <div class="flex-1 h-px" style="background:rgba(255,255,255,0.08);"></div>
     </div><!-- Social Icons -->
     <div class="flex justify-center gap-4">
      <a href="#" class="w-11 h-11 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:-translate-y-1" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
       <svg width="18" height="18" viewbox="0 0 24 24" fill="none"><path d="M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z" stroke="rgba(255,255,255,0.6)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
       </svg></a> <a href="#" class="w-11 h-11 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:-translate-y-1" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
       <svg width="18" height="18" viewbox="0 0 24 24" fill="none"><rect x="2" y="2" width="20" height="20" rx="5" stroke="rgba(255,255,255,0.6)" stroke-width="2" /><circle cx="12" cy="12" r="5" stroke="rgba(255,255,255,0.6)" stroke-width="2" /><circle cx="17.5" cy="6.5" r="1.5" fill="rgba(255,255,255,0.6)" />
       </svg></a> <a href="#" class="w-11 h-11 rounded-full flex items-center justify-center transition-all duration-300 hover:scale-110 hover:-translate-y-1" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);">
       <svg width="18" height="18" viewbox="0 0 24 24" fill="none"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" /><path d="M20.52 3.449C12.831-3.984.106 1.407.101 11.893c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.423-8.452z" stroke="rgba(255,255,255,0.6)" stroke-width="1.5" fill="none" />
       </svg></a>
     </div>
    </div>
   </div>
  </div>
  <script>
  const defaultConfig = {
    background_color: "#0f0f1a",
    surface_color: "rgba(255,255,255,0.07)",
    text_color: "#ffffff",
    primary_action: "#8b5cf6",
    secondary_action: "#a78bfa",
    font_family: "Outfit",
    font_size: 16,
    page_title: "Create an Account",
    button_text: "Sign Up",
    footer_text: "Already have an account?"
  };

  function applyConfig(config) {
    const bg = config.background_color || defaultConfig.background_color;
    const text = config.text_color || defaultConfig.text_color;
    const primary = config.primary_action || defaultConfig.primary_action;
    const secondary = config.secondary_action || defaultConfig.secondary_action;
    const font = config.font_family || defaultConfig.font_family;
    const size = config.font_size || defaultConfig.font_size;

    document.getElementById('app-wrapper').style.background = bg;
    document.getElementById('page-title').style.color = text;
    document.getElementById('page-title').textContent = config.page_title || defaultConfig.page_title;
    document.getElementById('submit-btn').style.background = `linear-gradient(135deg,${primary},#ec4899)`;
    document.getElementById('submit-btn').textContent = config.button_text || defaultConfig.button_text;

    const footerEl = document.getElementById('footer-text');
    const footerTxt = config.footer_text || defaultConfig.footer_text;
    footerEl.innerHTML = `${footerTxt} <a href="#" class="font-medium hover:underline" style="color:${secondary};">Login here</a>`;

    document.body.style.fontFamily = `${font}, sans-serif`;

    document.getElementById('page-title').style.fontSize = `${size * 1.75}px`;
    document.querySelectorAll('label').forEach(l => l.style.fontSize = `${size * 0.875}px`);
    document.querySelectorAll('input').forEach(i => i.style.fontSize = `${size * 0.875}px`);
    document.getElementById('submit-btn').style.fontSize = `${size * 0.875}px`;
  }

  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (config) => applyConfig(config),
    mapToCapabilities: (config) => ({
      recolorables: [
        { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => config.primary_action || defaultConfig.primary_action, set: (v) => { config.primary_action = v; window.elementSdk.setConfig({ primary_action: v }); } },
        { get: () => config.secondary_action || defaultConfig.secondary_action, set: (v) => { config.secondary_action = v; window.elementSdk.setConfig({ secondary_action: v }); } }
      ],
      borderables: [],
      fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
    }),
    mapToEditPanelValues: (config) => new Map([
      ["page_title", config.page_title || defaultConfig.page_title],
      ["button_text", config.button_text || defaultConfig.button_text],
      ["footer_text", config.footer_text || defaultConfig.footer_text]
    ])
  });

  // Form handling
  document.getElementById('signup-form').addEventListener('submit', (e) => {
    e.preventDefault();
    document.getElementById('signup-form').classList.add('hidden');
    document.getElementById('success-msg').classList.remove('hidden');
    document.getElementById('success-msg').classList.add('fade-in');
  });

  // Password toggle
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  lucide.createIcons();
</script>
